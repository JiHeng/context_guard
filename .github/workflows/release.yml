name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release tarball
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          STAGING="context-guard-${TAG}"
          mkdir "$STAGING"
          cp -r engine/ proxy/ claude_code/ "$STAGING/"
          cp context_guard.py config.json cg install.sh uninstall.sh "$STAGING/"
          tar -czf "context-guard-${TAG}.tar.gz" "$STAGING"
          echo "ASSET=context-guard-${TAG}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ASSET }}
